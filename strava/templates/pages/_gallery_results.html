{% load humanize %}
<div class="gallery-grid" id="gallery-grid">
  {% for activity in photos %}{% include "widgets/gallery_item.html" %}{% endfor %}
</div>

{% if not photos %}
<div class="gallery-empty" style="display:flex">
  <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"></rect><circle cx="8.5" cy="10" r="1.6"></circle><polyline points="5 18 11 12 15 16 18 13 21 16"></polyline></svg>
  <h3>No media found</h3>
  <p>Try a different sport or search term</p>
</div>
{% endif %}

<!-- Out-of-band hero count update -->
<p class="gallery-hero-count" id="gallery-count" hx-swap-oob="true">{{ count|intcomma }} photo{{ count|pluralize }}</p>
