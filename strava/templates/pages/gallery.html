{% extends "pages/base.html" %}
{% load static humanize %}

{% block title %}Gallery{% endblock %}

{% block content %}
<!-- ============ Gallery Page ============ -->
<main class="gallery-page" data-screen-label="Gallery">

  <!-- Hero / header -->
  <div class="gallery-hero">
    <div class="gallery-hero-left">
      <p class="gallery-hero-eyebrow">Media Library</p>
      <h1>Gallery</h1>
      <p class="gallery-hero-count" id="gallery-count">{{ count|intcomma }} photo{{ count|pluralize }}</p>
    </div>

    <form class="gallery-filters" id="gallery-filters"
          hx-get="{% url 'strava:gallery' %}"
          hx-target="#gallery-results"
          hx-swap="innerHTML"
          hx-push-url="true"
          hx-trigger="change, keyup delay:300ms from:#gallery-search">
      <input type="hidden" name="sport" id="g-sport" value="{{ sport }}">

      <div class="gf-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" placeholder="Search photos…" id="gallery-search" name="q" value="{{ q }}">
      </div>

      <div class="af-sport-wrap">
        <select class="af-sport-select" name="year">
          <option value="all"{% if year == 'all' %} selected{% endif %}>All years</option>
          {% for y in year_list %}<option value="{{ y }}"{% if year == y|stringformat:'s' %} selected{% endif %}>{{ y }}</option>{% endfor %}
        </select>
        <span class="af-sport-caret"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg></span>
      </div>

      <div class="af-sport-wrap">
        <select class="af-sport-select" name="sort">
          <option value="newest"{% if sort == 'newest' %} selected{% endif %}>Newest first</option>
          <option value="oldest"{% if sort == 'oldest' %} selected{% endif %}>Oldest first</option>
          <option value="kudos"{% if sort == 'kudos' %} selected{% endif %}>Most kudos</option>
        </select>
        <span class="af-sport-caret"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg></span>
      </div>

      <div class="view-toggle" id="view-toggle">
        <button type="button" class="active" data-view="grid" onclick="setView('grid', this)" title="Grid — with activity info">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <rect x="3" y="3" width="8" height="8" rx="1"></rect>
            <line x1="3" y1="14" x2="11" y2="14"></line><line x1="3" y1="17" x2="9" y2="17"></line>
            <rect x="13" y="3" width="8" height="8" rx="1"></rect>
            <line x1="13" y1="14" x2="21" y2="14"></line><line x1="13" y1="17" x2="19" y2="17"></line>
          </svg>
        </button>
        <button type="button" data-view="squares" onclick="setView('squares', this)" title="Squares — photo only, 1:1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <rect x="3" y="3" width="8" height="8" rx="1"></rect>
            <rect x="13" y="3" width="8" height="8" rx="1"></rect>
            <rect x="3" y="13" width="8" height="8" rx="1"></rect>
            <rect x="13" y="13" width="8" height="8" rx="1"></rect>
          </svg>
        </button>
        <button type="button" data-view="wall" onclick="setView('wall', this)" title="Wall — original ratio">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <rect x="3" y="3" width="8" height="12" rx="1"></rect>
            <rect x="13" y="3" width="8" height="7" rx="1"></rect>
            <rect x="13" y="12" width="8" height="9" rx="1"></rect>
            <rect x="3" y="17" width="8" height="4" rx="1"></rect>
          </svg>
        </button>
      </div>
    </form>
  </div>

  <!-- Sport filter tabs -->
  <div class="sport-tabs" id="sport-tabs">
    <button type="button" class="sport-tab{% if sport == 'all' %} active{% endif %}" onclick="setSport('all', this)">All sports</button>
    <button type="button" class="sport-tab{% if sport == 'run' %} active{% endif %}" onclick="setSport('run', this)">
      {% include "widgets/sport_icon.html" with type='run' %} Run
    </button>
    <button type="button" class="sport-tab{% if sport == 'ride' %} active{% endif %}" onclick="setSport('ride', this)">
      {% include "widgets/sport_icon.html" with type='ride' %} Ride
    </button>
    <button type="button" class="sport-tab{% if sport == 'trail' %} active{% endif %}" onclick="setSport('trail', this)">
      {% include "widgets/sport_icon.html" with type='trail' %} Trail Run
    </button>
    <button type="button" class="sport-tab{% if sport == 'hike' %} active{% endif %}" onclick="setSport('hike', this)">
      {% include "widgets/sport_icon.html" with type='hike' %} Hike
    </button>
    <button type="button" class="sport-tab{% if sport == 'swim' %} active{% endif %}" onclick="setSport('swim', this)">
      {% include "widgets/sport_icon.html" with type='swim' %} Swim
    </button>
  </div>

  <!-- Grid — rendered server-side, swapped by htmx -->
  <div id="gallery-results">
    {% include "pages/_gallery_results.html" %}
  </div>

</main>

<!-- ============ Lightbox ============ -->
<div class="lightbox" id="lightbox" onclick="closeLightboxOnBg(event)">
  <div class="lightbox-inner">
    <div class="lightbox-media">
      <div class="lightbox-media-inner" id="lb-media-inner"></div>
      <button class="lightbox-close" onclick="closeLightbox()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
      <button class="lightbox-nav lightbox-prev" onclick="lbNav(-1)">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <button class="lightbox-nav lightbox-next" onclick="lbNav(1)">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
    </div>
    <div class="lightbox-footer">
      <div class="lightbox-info">
        <h2 class="lightbox-title" id="lb-title"></h2>
        <div class="lightbox-meta">
          <span id="lb-meta-date"></span>
          <span id="lb-meta-act"></span>
          <span id="lb-meta-dist"></span>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// ——— View toggle (presentational, client-side) ———
let currentView = 'grid';
function applyView() {
  const g = document.getElementById('gallery-grid');
  if (!g) return;
  if (currentView === 'grid') g.removeAttribute('data-view');
  else g.setAttribute('data-view', currentView);
}
function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('#view-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyView();
}

// ——— Sport tabs drive the filter form ———
function setSport(sport, btn) {
  document.getElementById('g-sport').value = sport;
  document.querySelectorAll('.sport-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('gallery-filters').requestSubmit();
}

// Re-apply the chosen layout after htmx swaps in a fresh grid.
document.body.addEventListener('htmx:afterSwap', function(e) {
  if (e.target.id === 'gallery-results') applyView();
});

// ——— Lightbox (reads data-* off the rendered cards) ———
const CAL_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="4" y="5" width="16" height="15" rx="2"></rect><line x1="8" y1="3" x2="8" y2="7"></line><line x1="16" y1="3" x2="16" y2="7"></line><line x1="4" y1="10" x2="20" y2="10"></line></svg>';
const ACT_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="6" cy="18" r="2.4"></circle><circle cx="18" cy="6" r="2.4"></circle><path d="M8 17 C 13 15, 11 8, 16 7"></path></svg>';
const DIST_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3 20 10 7 14 13 17 9 21 20"></polyline></svg>';
let lbItems = [], lbIndex = 0;

function openLightbox(el) {
  lbItems = Array.from(document.querySelectorAll('#gallery-grid .gallery-item'));
  lbIndex = lbItems.indexOf(el);
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.addEventListener('keydown', lbKeyHandler);
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.removeEventListener('keydown', lbKeyHandler);
}
function closeLightboxOnBg(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}
function lbNav(dir) {
  if (!lbItems.length) return;
  lbIndex = (lbIndex + dir + lbItems.length) % lbItems.length;
  updateLightbox();
}
function lbKeyHandler(e) {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'ArrowLeft')  lbNav(-1);
}
function updateLightbox() {
  const el = lbItems[lbIndex];
  if (!el) return;
  const d = el.dataset;
  document.getElementById('lb-title').textContent = d.title;
  document.getElementById('lb-media-inner').innerHTML = d.photo
    ? '<img src="' + d.photo + '" alt="">'
    : '';
  document.getElementById('lb-meta-date').innerHTML = CAL_SVG + ' ' + d.date;
  document.getElementById('lb-meta-act').innerHTML = ACT_SVG + ' ' + d.sport;
  document.getElementById('lb-meta-dist').innerHTML = DIST_SVG + ' ' + d.dist;
}
</script>
{% endblock %}
