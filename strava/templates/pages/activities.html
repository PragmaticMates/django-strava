{% extends "pages/base.html" %}
{% load static humanize %}

{% block title %}Activities{% endblock %}

{% block content %}
<main class="acts-page" data-screen-label="Activities">

  <!-- Hero -->
  <div class="acts-hero">
    <div>
      <p class="acts-hero-eyebrow">Training log</p>
      <h1>Activities</h1>
      <p class="acts-hero-sub" id="hero-sub">{{ summary.count }} activities</p>
    </div>
    <a href="https://www.strava.com/upload/device" target="_blank" rel="noopener" class="acts-upload-btn">
      <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"></polyline><line x1="12" y1="12" x2="12" y2="21"></line><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path></svg>
      Upload Activity
    </a>
  </div>

  <!-- Filter bar -->
  <form class="acts-filters" id="acts-filters"
        hx-get="{% url 'strava:activities' %}"
        hx-target="#acts-results"
        hx-swap="innerHTML"
        hx-push-url="true"
        hx-trigger="change, keyup delay:300ms from:#search-input">
    <input type="hidden" name="view" id="f-view" value="{{ view }}">
    <input type="hidden" name="sort" id="f-sort" value="{{ sort }}">
    <input type="hidden" name="dir" id="f-dir" value="{{ dir }}">

    <div class="af-search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" placeholder="Search activities…" id="search-input" name="q" value="{{ q }}">
    </div>

    <div class="af-sep"></div>

    <div class="af-sport-wrap">
      <select class="af-sport-select" id="sport-select" name="sport">
        <option value="all">All Sports</option>
        {% for value, label in sport_type_list %}<option value="{{ value }}"{% if sport == value %} selected{% endif %}>{{ label }}</option>{% endfor %}
      </select>
      <span class="af-sport-caret"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg></span>
    </div>

    <div class="af-sport-wrap">
      <select class="af-sport-select" id="gear-select" name="gear">
        <option value="all">All Gear</option>
        {% for g in gear_list %}<option value="{{ g.pk }}"{% if gear == g.pk|stringformat:'s' %} selected{% endif %}>{{ g }}</option>{% endfor %}
      </select>
      <span class="af-sport-caret"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg></span>
    </div>

    <div class="af-sep"></div>

    <div class="af-sport-wrap">
      <select class="af-sport-select" id="month-select" name="month">
        <option value="all">All Months</option>
        {% for value, label in month_list %}<option value="{{ value }}"{% if month == value %} selected{% endif %}>{{ label }}</option>{% endfor %}
      </select>
      <span class="af-sport-caret"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg></span>
    </div>

    <div class="af-view-toggle">
      <button type="button" class="af-view-btn{% if view != 'table' %} active{% endif %}" id="view-grid" onclick="setView('grid')" title="Grid view">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect></svg>
      </button>
      <button type="button" class="af-view-btn{% if view == 'table' %} active{% endif %}" id="view-table" onclick="setView('table')" title="Table view">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="9" x2="9" y2="21"></line></svg>
      </button>
    </div>
  </form>

  <!-- Activity feed — rendered server-side, swapped by htmx -->
  <div id="acts-results">
    {% include "pages/_activities_results.html" %}
  </div>

</main>

{% block extra_js %}
<script src="{% static 'js/charts.js' %}"></script>
<script>
function renderRoutes(root) {
  (root || document).querySelectorAll('.fc-route[data-polyline]').forEach(function(svg) {
    var pts = window.DSCharts.decodePolyline(svg.dataset.polyline);
    if (pts.length) window.DSCharts.renderRoute(svg, pts);
  });
}
renderRoutes(document);
document.body.addEventListener('htmx:afterSwap', function(e) { renderRoutes(e.target); });

function setView(view) {
  document.getElementById('view-grid').classList.toggle('active', view === 'grid');
  document.getElementById('view-table').classList.toggle('active', view === 'table');
  document.getElementById('f-view').value = view;
  document.getElementById('acts-filters').requestSubmit();
}
function setSort(key) {
  var sortInput = document.getElementById('f-sort');
  var dirInput = document.getElementById('f-dir');
  if (sortInput.value === key) {
    dirInput.value = dirInput.value === 'asc' ? 'desc' : 'asc';
  } else {
    sortInput.value = key;
    dirInput.value = 'asc';
  }
  document.getElementById('acts-filters').requestSubmit();
}
</script>
{% endblock %}
{% endblock %}
